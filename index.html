<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTI</title>
    <link rel="stylesheet" href="/NTI-Tasks/css/style.css">
</head>
<body>
    <section id="numbers">
        
            <span class="word">TEN</span>
            <span class="word">NINE</span>
            <span class="word">EIGHT</span>
            <span class="word">SEVEN</span>
            <span class="word">SIX</span>
            <span class="word">FIVE</span>
            <span class="word">FOUR</span>
            <span class="word">THREE</span>
            <span class="word">TWO</span>
            <span class="word">ONE</span>
    </section>

    <section id="calculator">
        
        <div class="content">
            <h2>8 + 2 = 10</h2>
        <button class="yellow">+</button>
        <button class="yellow">-</button>
        <button class="yellow">*</button>
        <button class="yellow">%</button>
        <button class="blue">7</button>
        <button class="blue">8</button>
        <button class="blue">9</button>
        <button class="blue">4</button>
        <button class="blue">5</button>
        <button class="blue">6</button>
        <button class="blue">1</button>
        <button class="blue">2</button>
        <button class="blue">3</button>
        <button class="blue">0</button>
        <button class="blue">.</button>
        <button>C</button>
        <button>=</button>   
        </div>
    </section>

    <section id="basic-info" class="text-center">
        <h2>Basic Information</h2>
        <div class="row">
            <label>Name<sup>*</sup></label>
             <input type="text" placeholder="Enter Your Name">
           </div>

           <div class="row">
                <label>Email<sup>*</sup></label>
             <input type="email" placeholder="Enter Your Email">
           </div>

           <div class="row">
                    <label>Number<sup>*</sup></sapn>
                   <input type="number" placeholder="Enter Your Number">
         
           </div>

          <div class="row">
            <label>Password<sup>*</sup></label>
            <input type="password" placeholder="Enter Your password">
          </div> 
           
            
        
    </section>
</body>
</html>
